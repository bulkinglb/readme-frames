name: Render README animations

on:
  workflow_dispatch:
  push:
    paths:
      - 'compositions/**'
      - 'config.js'
      - '.github/workflows/render-readme.yml'

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-ffmpeg-libblas3

      - run: sudo apt-get update && sudo apt-get install -y ffmpeg libblas3 liblapack3

      # cache hyperframes global install
      - name: Cache hyperframes
        id: cache-hyperframes
        uses: actions/cache@v4
        with:
          path: ~/.npm-global
          key: hyperframes-${{ runner.os }}-${{ hashFiles('**/render-readme.yml') }}

      - name: Set npm global path
        run: |
          mkdir -p ~/.npm-global
          npm config set prefix ~/.npm-global
          echo "$HOME/.npm-global/bin" >> $GITHUB_PATH

      - name: Install hyperframes
        if: steps.cache-hyperframes.outputs.cache-hit != 'true'
        run: npm install -g hyperframes

      # config.js must sit next to each index.html so Chrome can load it
      - run: >
          cp config.js compositions/skills-ticker/config.js &&
          cp config.js compositions/terminal/config.js &&
          cp config.js compositions/intro-card/config.js &&
          cp config.js compositions/commit-chart/config.js &&
          cp config.js compositions/lang-donut/config.js

      # fetch live GitHub data and bake it into each composition's data.js so they
      # can build their timelines synchronously (HyperFrames can't render an
      # in-browser async fetch — it captures a permanent zero duration)
      - name: Fetch commit activity data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/fetch-commit-data.js

      - name: Fetch language data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/fetch-language-data.js

      # render to MP4 first (hyperframes doesn't support gif directly)
      # must cd into each project dir so hyperframes finds index.html in CWD
      - run: cd compositions/intro-card && hyperframes render --fps 60 --output ../../assets/intro-card.mp4

      - run: cd compositions/skills-ticker && hyperframes render --fps 60 --output ../../assets/skills-ticker.mp4

      - run: cd compositions/terminal && hyperframes render --fps 60 --output ../../assets/terminal.mp4

      - run: cd compositions/commit-chart && hyperframes render --fps 60 --output ../../assets/commit-chart.mp4

      - run: cd compositions/lang-donut && hyperframes render --fps 60 --output ../../assets/lang-donut.mp4

      # convert MP4 → optimised GIF with ffmpeg
      - run: >
          ffmpeg -y -i assets/intro-card.mp4
          -vf "fps=30,scale=1280:-1:flags=lanczos,split[s0][s1];[s0]palettegen[p];[s1][p]paletteuse"
          -loop 0 assets/intro-card.gif

      - run: >
          ffmpeg -y -i assets/skills-ticker.mp4
          -vf "fps=30,scale=960:-1:flags=lanczos,split[s0][s1];[s0]palettegen[p];[s1][p]paletteuse"
          -loop 0 assets/skills-ticker.gif

      - run: >
          ffmpeg -y -i assets/terminal.mp4
          -vf "fps=30,scale=800:-1:flags=lanczos,split[s0][s1];[s0]palettegen[p];[s1][p]paletteuse"
          -loop 0 assets/terminal.gif

      - run: >
          ffmpeg -y -i assets/commit-chart.mp4
          -vf "fps=30,scale=900:-1:flags=lanczos,split[s0][s1];[s0]palettegen[p];[s1][p]paletteuse"
          -loop 0 assets/commit-chart.gif

      # lang-donut is a data chart — grab the final settled frame as a static PNG
      # (a looping GIF re-animates and never sits still long enough to read)
      - run: >
          ffmpeg -y -sseof -0.3 -i assets/lang-donut.mp4
          -update 1 -frames:v 1
          -vf "scale=600:-1:flags=lanczos" assets/lang-donut.png

      # clean up intermediary MP4s
      - run: rm assets/intro-card.mp4 assets/skills-ticker.mp4 assets/terminal.mp4 assets/commit-chart.mp4 assets/lang-donut.mp4

      - name: Commit rendered GIFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/
          git commit -m "chore: re-render README animations" || echo "nothing to commit"
          # rendering leaves build artifacts behind (copied config.js, generated
          # data.js) — --autostash sets them aside so the rebase doesn't abort
          git pull --rebase --autostash
          git push
